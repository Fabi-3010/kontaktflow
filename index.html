<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KontaktFlow — FlowGate AI</title>
<meta name="description" content="Digitales Kontakt-Management für Versicherungsvermittler — FlowGate AI">
<meta name="theme-color" content="#005A96">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="KontaktFlow">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --fg-blue:#007ACB;--fg-blue-dark:#005A96;--fg-blue-light:#E6F3FB;
  --fg-orange:#FF6600;--fg-orange-light:#FFF3E8;
  --gray-900:#212121;--gray-700:#616161;--gray-500:#9E9E9E;
  --gray-300:#E0E0E0;--gray-100:#F5F5F5;--gray-50:#FAFAFA;
  --safe-green:#86B817;--safe-green-bg:#F2F8E6;
  --warn-red:#CC2936;--warn-red-bg:#FDEDEF;
  --white:#FFFFFF;
  --bg:#F5F5F5;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.03);
  --shadow-lg:0 8px 24px rgba(0,0,0,.07),0 2px 8px rgba(0,0,0,.04);
  --radius:14px;--radius-sm:10px;
}
html{font-size:15px}
body{font-family:-apple-system,BlinkMacSystemFont,'Helvetica Neue',Helvetica,system-ui,sans-serif;background:var(--bg);color:var(--gray-900);height:100vh;overflow:hidden}

/* ===== SIDEBAR ===== */
.sidebar{width:240px;min-height:100vh;background:linear-gradient(180deg,var(--fg-blue-dark),#003F6B);color:#fff;display:flex;flex-direction:column;padding:0;position:fixed;left:0;top:0;bottom:0;z-index:100}
.sidebar-top-bar{height:4px;background:var(--fg-blue);width:100%;flex-shrink:0}
.sidebar-accent-bar{height:2px;background:var(--fg-orange);width:100%;flex-shrink:0}
.logo{padding:24px 22px 28px;display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;border-radius:8px;background:var(--fg-orange);display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;fill:white}
.logo-text{display:flex;flex-direction:column}
.logo-brand{font-size:.68rem;font-weight:700;color:var(--fg-orange);letter-spacing:2px;text-transform:uppercase}
.logo-name{font-size:1.2rem;font-weight:700;letter-spacing:-.3px;margin-top:1px}

.nav-items{list-style:none;flex:1;padding:0 10px}
.nav-items li{padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:11px;font-size:.9rem;color:rgba(255,255,255,.55);transition:all .2s;border-radius:var(--radius-sm);font-weight:500;margin-bottom:2px}
.nav-items li:hover{color:#fff;background:rgba(255,255,255,.08)}
.nav-items li.active{color:#fff;background:rgba(0,122,203,.3)}
.nav-items li svg{width:19px;height:19px;opacity:.7}
.nav-items li.active svg{opacity:1}

.sidebar-stats{padding:18px 22px;border-top:1px solid rgba(255,255,255,.08);margin-top:auto}
.sidebar-stats .stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:.8rem;color:rgba(255,255,255,.45)}
.sidebar-stats .stat-row span:last-child{font-weight:600;color:rgba(255,255,255,.75)}
.sidebar-footer{padding:14px 22px;border-top:1px solid rgba(255,255,255,.06);font-size:.68rem;color:rgba(255,255,255,.25);text-align:center;letter-spacing:.5px}

/* ===== MAIN ===== */
main{position:fixed;left:240px;top:0;right:0;bottom:0;overflow-y:auto;padding:0}
.page-top-accent{height:4px;background:var(--fg-blue);position:sticky;top:0;z-index:50}
.page-header{padding:28px 36px 0;display:flex;justify-content:space-between;align-items:center}
.page-header h1{font-size:1.5rem;font-weight:700;color:var(--fg-blue-dark);letter-spacing:-.3px}
.page-content{padding:24px 36px 36px}

/* ===== BUTTONS ===== */
.btn{padding:10px 20px;border:none;border-radius:var(--radius-sm);font-size:.87rem;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;font-family:inherit}
.btn-primary{background:var(--fg-blue);color:#fff}
.btn-primary:hover{background:var(--fg-blue-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,122,203,.25)}
.btn-orange{background:var(--fg-orange);color:#fff}
.btn-orange:hover{background:#E55C00;transform:translateY(-1px);box-shadow:0 4px 12px rgba(255,102,0,.25)}
.btn-secondary{background:var(--white);color:var(--gray-900);border:1px solid var(--gray-300)}
.btn-secondary:hover{border-color:var(--fg-blue);color:var(--fg-blue)}
.btn-ghost{background:transparent;color:var(--gray-700);padding:8px 12px}
.btn-ghost:hover{color:var(--fg-blue);background:var(--fg-blue-light)}
.btn-danger{background:transparent;color:var(--warn-red);padding:8px 12px}
.btn-danger:hover{background:var(--warn-red-bg)}
.btn-sm{padding:7px 14px;font-size:.82rem}

/* ===== CARDS ===== */
.card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px;transition:all .25s}
.card:hover{box-shadow:var(--shadow-lg)}

/* ===== SECTION HEADER (numbered circle) ===== */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.section-num{width:28px;height:28px;border-radius:50%;background:var(--fg-blue);color:white;display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:700;flex-shrink:0}
.section-title-text{font-size:1.05rem;font-weight:700;color:var(--fg-blue-dark)}
.section-accent{width:40px;height:2px;background:var(--fg-orange);margin:6px 0 16px 40px;border-radius:1px}

/* ===== STATS ROW ===== */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:28px}
.stat-card{background:var(--white);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:all .25s;border-left:4px solid transparent}
.stat-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);cursor:pointer}
.stat-card .stat-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:12px;font-size:1.1rem}
.stat-card .stat-number{font-size:1.7rem;font-weight:700;letter-spacing:-.5px;color:var(--fg-blue-dark)}
.stat-card .stat-label{font-size:.8rem;color:var(--gray-500);margin-top:3px;font-weight:500}
.stat-card.green{border-left-color:var(--safe-green)}
.stat-card.green .stat-icon{background:var(--safe-green-bg);color:var(--safe-green)}
.stat-card.yellow{border-left-color:var(--fg-orange)}
.stat-card.yellow .stat-icon{background:var(--fg-orange-light);color:var(--fg-orange)}
.stat-card.red{border-left-color:var(--warn-red)}
.stat-card.red .stat-icon{background:var(--warn-red-bg);color:var(--warn-red)}
.stat-card.total{border-left-color:var(--fg-blue)}
.stat-card.total .stat-icon{background:var(--fg-blue-light);color:var(--fg-blue)}

/* ===== DASHBOARD GRID ===== */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:24px}

/* ===== TODAY LIST ===== */
.today-list{display:flex;flex-direction:column;gap:8px}
.today-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:var(--radius-sm);background:var(--gray-50);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.today-item:hover{background:var(--fg-blue-light);transform:translateX(4px);border-left-color:var(--fg-blue)}
.today-item .priority-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.today-item .ti-info{flex:1;min-width:0}
.today-item .ti-name{font-weight:600;font-size:.88rem;color:var(--gray-900)}
.today-item .ti-context{font-size:.77rem;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.today-item .ti-action{font-size:.77rem;color:var(--fg-blue);font-weight:600;flex-shrink:0}

/* ===== ACTIVITY ===== */
.activity-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100)}
.activity-item:last-child{border:none}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--fg-blue);margin-top:6px;flex-shrink:0}
.activity-text{font-size:.84rem;color:var(--gray-700);line-height:1.5}
.activity-text strong{color:var(--gray-900);font-weight:600}
.activity-time{font-size:.73rem;color:var(--gray-500);margin-top:2px}

/* ===== CONTACTS TOOLBAR ===== */
.contacts-toolbar{display:flex;gap:12px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.search-box{flex:1;min-width:200px;position:relative}
.search-box input{width:100%;padding:10px 16px 10px 40px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:.9rem;background:var(--white);transition:all .2s;font-family:inherit}
.search-box input:focus{outline:none;border-color:var(--fg-blue);box-shadow:0 0 0 3px rgba(0,122,203,.1)}
.search-box svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--gray-500)}
.filter-pills{display:flex;gap:6px}
.filter-pill{padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:500;cursor:pointer;border:1px solid var(--gray-300);background:var(--white);color:var(--gray-700);transition:all .2s}
.filter-pill:hover{border-color:var(--gray-500)}
.filter-pill.active{background:var(--fg-blue);color:#fff;border-color:var(--fg-blue)}
.filter-pill.active-green{background:var(--safe-green);color:#fff;border-color:var(--safe-green)}
.filter-pill.active-yellow{background:var(--fg-orange);color:#fff;border-color:var(--fg-orange)}
.filter-pill.active-red{background:var(--warn-red);color:#fff;border-color:var(--warn-red)}

/* ===== CONTACT CARDS ===== */
.contacts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.contact-card{background:var(--white);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);transition:all .25s;cursor:pointer;border-left:4px solid transparent;position:relative}
.contact-card:hover{box-shadow:var(--shadow-lg);transform:translateY(-2px)}
.contact-card.p-green{border-left-color:var(--safe-green)}
.contact-card.p-yellow{border-left-color:var(--fg-orange)}
.contact-card.p-red{border-left-color:var(--warn-red)}
.cc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.cc-name{font-weight:700;font-size:1.02rem;color:var(--fg-blue-dark)}
.cc-priority{padding:4px 10px;border-radius:12px;font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.cc-priority.green{background:var(--safe-green-bg);color:var(--safe-green)}
.cc-priority.yellow{background:var(--fg-orange-light);color:var(--fg-orange)}
.cc-priority.red{background:var(--warn-red-bg);color:var(--warn-red)}
.cc-details{display:flex;flex-direction:column;gap:5px}
.cc-detail{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--gray-700)}
.cc-detail svg{width:15px;height:15px;flex-shrink:0;color:var(--gray-500)}
.cc-links{margin-top:12px;padding-top:12px;border-top:1px solid var(--gray-100);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cc-link-badge{padding:3px 10px;background:var(--fg-blue-light);color:var(--fg-blue);border-radius:12px;font-size:.74rem;font-weight:500}
.cc-footer{margin-top:12px;display:flex;justify-content:space-between;align-items:center}
.cc-last-seen{font-size:.76rem;color:var(--gray-500)}

/* ===== NETWORK ===== */
#network-canvas{width:100%;border-radius:var(--radius);background:var(--white);box-shadow:var(--shadow);cursor:grab}
#network-canvas:active{cursor:grabbing}
.network-legend{display:flex;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:.83rem;color:var(--gray-700)}
.legend-dot{width:12px;height:12px;border-radius:50%}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;inset:0;background:rgba(0,58,107,.35);backdrop-filter:blur(6px);z-index:1000;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:var(--white);border-radius:var(--radius);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.15);animation:modalIn .25s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(20px) scale(.98)}to{opacity:1;transform:none}}
.modal-top-bar{height:4px;background:var(--fg-blue);border-radius:var(--radius) var(--radius) 0 0}
.modal-header{padding:22px 28px 0;display:flex;justify-content:space-between;align-items:center}
.modal-header h2{font-size:1.15rem;font-weight:700;color:var(--fg-blue-dark)}
.modal-close{width:32px;height:32px;border-radius:8px;border:none;background:var(--gray-50);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--gray-700);font-size:1.1rem;transition:all .2s}
.modal-close:hover{background:var(--gray-100);color:var(--gray-900)}
.modal-body{padding:20px 28px 28px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:.78rem;font-weight:600;color:var(--gray-500);margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.form-group input,.form-group textarea,.form-group select{width:100%;padding:10px 14px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:.9rem;font-family:inherit;transition:all .2s;background:var(--white)}
.form-group input:focus,.form-group textarea:focus,.form-group select:focus{outline:none;border-color:var(--fg-blue);box-shadow:0 0 0 3px rgba(0,122,203,.1)}
.form-group textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}

/* Priority Select */
.priority-select{display:flex;gap:8px}
.priority-option{flex:1;padding:10px;border:2px solid var(--gray-300);border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-size:.84rem;font-weight:600;transition:all .2s;color:var(--gray-700)}
.priority-option:hover{transform:translateY(-1px)}
.priority-option.green.selected{border-color:var(--safe-green);background:var(--safe-green-bg);color:var(--safe-green)}
.priority-option.yellow.selected{border-color:var(--fg-orange);background:var(--fg-orange-light);color:var(--fg-orange)}
.priority-option.red.selected{border-color:var(--warn-red);background:var(--warn-red-bg);color:var(--warn-red)}
.modal-footer{padding:0 28px 24px;display:flex;justify-content:flex-end;gap:10px}

/* Link Section */
.link-section{margin-top:8px}
.link-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.link-tag{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--fg-blue-light);color:var(--fg-blue);border-radius:16px;font-size:.82rem;font-weight:500}
.link-tag .remove-link{cursor:pointer;opacity:.6;font-size:.9rem}
.link-tag .remove-link:hover{opacity:1}
.link-add{display:flex;gap:8px;margin-top:8px}
.link-add select{flex:1;padding:8px 12px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit}

/* ===== DETAIL PANEL ===== */
.detail-overlay{position:fixed;inset:0;background:rgba(0,58,107,.35);backdrop-filter:blur(6px);z-index:900;display:none;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel{width:480px;background:var(--white);height:100vh;overflow-y:auto;box-shadow:-10px 0 30px rgba(0,0,0,.1);animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:none}}
.detail-top-bar{height:4px;background:var(--fg-blue)}
.detail-header{padding:28px;display:flex;justify-content:space-between;align-items:flex-start;border-bottom:1px solid var(--gray-100)}
.detail-header .dh-left h2{font-size:1.25rem;font-weight:700;color:var(--fg-blue-dark);margin-bottom:6px}
.detail-header .dh-left .dh-priority{display:inline-block;padding:4px 12px;border-radius:12px;font-size:.76rem;font-weight:600}
.detail-body{padding:28px}
.detail-section{margin-bottom:24px}
.detail-section h3{font-size:.78rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
.detail-section-bar{width:30px;height:2px;background:var(--fg-orange);margin:-6px 0 12px;border-radius:1px}
.detail-field{display:flex;align-items:flex-start;gap:10px;padding:7px 0;font-size:.88rem}
.detail-field svg{width:17px;height:17px;color:var(--gray-500);flex-shrink:0;margin-top:2px}
.detail-field .df-value{color:var(--gray-900)}
.detail-field .df-empty{color:var(--gray-500);font-style:italic}
.detail-links{display:flex;flex-direction:column;gap:8px}
.detail-link-card{display:flex;align-items:center;gap:12px;padding:12px;background:var(--gray-50);border-radius:var(--radius-sm);cursor:pointer;transition:all .2s;border-left:3px solid transparent}
.detail-link-card:hover{background:var(--fg-blue-light);transform:translateX(4px);border-left-color:var(--fg-blue)}
.detail-link-card .dlc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.detail-link-card .dlc-name{font-weight:600;font-size:.88rem;color:var(--fg-blue-dark)}
.detail-link-card .dlc-context{font-size:.76rem;color:var(--gray-500)}
.detail-actions{display:flex;gap:10px;padding:28px;border-top:1px solid var(--gray-100)}

/* Quick Priority in Detail */
.quick-priority{display:flex;gap:6px;margin-top:8px}
.qp-btn{width:32px;height:32px;border-radius:50%;border:2px solid var(--gray-300);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--white)}
.qp-btn:hover{transform:scale(1.15)}
.qp-btn.active{box-shadow:0 0 0 3px rgba(0,0,0,.1)}

/* Quick Link Search in Detail */
.quick-link-box{margin-top:10px;position:relative}
.quick-link-input{width:100%;padding:9px 14px;border:1px solid var(--gray-300);border-radius:var(--radius-sm);font-size:.85rem;font-family:inherit;transition:all .2s}
.quick-link-input:focus{outline:none;border-color:var(--fg-blue);box-shadow:0 0 0 3px rgba(0,122,203,.1)}
.quick-link-results{position:absolute;left:0;right:0;top:100%;margin-top:4px;background:var(--white);border:1px solid var(--gray-300);border-radius:var(--radius-sm);box-shadow:var(--shadow-lg);max-height:200px;overflow-y:auto;z-index:10;display:none}
.quick-link-results.open{display:block}
.qlr-item{padding:10px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;font-size:.85rem;transition:all .15s}
.qlr-item:hover{background:var(--fg-blue-light)}
.qlr-item .qlr-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.qlr-item .qlr-name{font-weight:600;color:var(--fg-blue-dark)}
.qlr-item .qlr-phone{font-size:.76rem;color:var(--gray-500);margin-left:auto}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray-500)}
.empty-state svg{width:64px;height:64px;color:var(--gray-300);margin-bottom:16px}
.empty-state h3{font-size:1.05rem;color:var(--gray-900);margin-bottom:8px}
.empty-state p{font-size:.88rem;margin-bottom:20px}

/* ===== TOAST ===== */
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;background:var(--fg-blue-dark);color:#fff;border-radius:var(--radius-sm);font-size:.87rem;font-weight:500;box-shadow:0 10px 30px rgba(0,0,0,.2);z-index:2000;transform:translateY(100px);opacity:0;transition:all .3s ease;border-left:4px solid var(--fg-orange)}
.toast.show{transform:none;opacity:1}

/* ===== GRADIENT BAR ===== */
.gradient-bar{height:3px;background:linear-gradient(90deg,var(--fg-blue),var(--fg-orange));border-radius:2px}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--gray-300);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gray-500)}

.view{display:none}.view.active{display:block}

/* ===== FOCUS MODE ===== */
.focus-start{text-align:center;padding:60px 20px}
.focus-start h2{font-size:1.4rem;color:var(--fg-blue-dark);margin-bottom:8px}
.focus-start p{color:var(--gray-500);margin-bottom:28px;font-size:.92rem}
.timer-options{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.timer-opt{width:80px;height:80px;border-radius:var(--radius);border:2px solid var(--gray-300);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;background:var(--white)}
.timer-opt:hover{border-color:var(--fg-blue);transform:translateY(-2px)}
.timer-opt.selected{border-color:var(--fg-orange);background:var(--fg-orange-light)}
.timer-opt .to-min{font-size:1.4rem;font-weight:700;color:var(--fg-blue-dark)}
.timer-opt .to-label{font-size:.7rem;color:var(--gray-500);margin-top:2px}
.focus-active{max-width:600px;margin:0 auto}
.focus-timer-bar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--fg-blue-dark);color:#fff;border-radius:var(--radius-sm);margin-bottom:20px}
.focus-timer-bar .ftb-time{font-size:1.3rem;font-weight:700;font-variant-numeric:tabular-nums}
.focus-timer-bar .ftb-progress{font-size:.85rem;opacity:.7}
.focus-progress{height:4px;background:var(--gray-100);border-radius:2px;margin-bottom:24px;overflow:hidden}
.focus-progress-fill{height:100%;background:linear-gradient(90deg,var(--fg-blue),var(--fg-orange));border-radius:2px;transition:width .3s}
.focus-card{background:var(--white);border-radius:var(--radius);box-shadow:var(--shadow-lg);padding:28px;animation:modalIn .3s ease}
.focus-card .fc-name{font-size:1.3rem;font-weight:700;color:var(--fg-blue-dark);margin-bottom:4px}
.focus-card .fc-phone{font-size:.9rem;color:var(--gray-500);margin-bottom:20px}
.focus-card .fc-section{margin-bottom:16px}
.focus-card .fc-label{font-size:.76rem;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.cat-grid{display:flex;flex-wrap:wrap;gap:6px}
.cat-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--gray-300);font-size:.8rem;cursor:pointer;transition:all .15s;background:var(--white);color:var(--gray-700)}
.cat-pill:hover{border-color:var(--fg-blue)}
.cat-pill.selected{background:var(--fg-blue);color:#fff;border-color:var(--fg-blue)}
.focus-card .fc-priority{display:flex;gap:8px}
.focus-card .fp-btn{flex:1;padding:12px;border:2px solid var(--gray-300);border-radius:var(--radius-sm);text-align:center;cursor:pointer;font-weight:600;font-size:.88rem;transition:all .2s}
.focus-card .fp-btn:hover{transform:translateY(-1px)}
.focus-card .fp-btn.sel-green{border-color:var(--safe-green);background:var(--safe-green-bg);color:var(--safe-green)}
.focus-card .fp-btn.sel-yellow{border-color:var(--fg-orange);background:var(--fg-orange-light);color:var(--fg-orange)}
.focus-card .fp-btn.sel-red{border-color:var(--warn-red);background:var(--warn-red-bg);color:var(--warn-red)}
.focus-link-area{margin-top:6px}
.focus-actions{display:flex;gap:10px;margin-top:20px}
.focus-actions .btn{flex:1;justify-content:center}
.focus-summary{text-align:center;padding:40px 20px}
.focus-summary h2{font-size:1.3rem;color:var(--fg-blue-dark);margin-bottom:8px}
.focus-summary .fs-stats{display:flex;gap:20px;justify-content:center;margin:20px 0}
.focus-summary .fs-stat{text-align:center}
.focus-summary .fs-stat .fs-num{font-size:1.6rem;font-weight:700;color:var(--fg-blue-dark)}
.focus-summary .fs-stat .fs-label{font-size:.78rem;color:var(--gray-500)}

/* ===== CALL STATUS ===== */
.call-status-bar{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.cs-pill{padding:5px 12px;border-radius:16px;font-size:.78rem;font-weight:600;cursor:pointer;border:1.5px solid var(--gray-300);transition:all .15s;background:var(--white)}
.cs-pill:hover{transform:translateY(-1px)}
.cs-pill.active{border-color:currentColor}
.call-log{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.call-log-item{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--gray-50);border-radius:var(--radius-sm);font-size:.82rem}
.call-log-item .cl-date{color:var(--gray-500);font-size:.75rem;margin-left:auto}
.cc-call-status{padding:3px 10px;border-radius:12px;font-size:.7rem;font-weight:600}

/* ===== DATA TOOLBAR ===== */
.data-toolbar{display:flex;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid rgba(255,255,255,.08)}
.data-toolbar .btn-data{padding:7px 12px;border:none;border-radius:var(--radius-sm);font-size:.72rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit;transition:all .2s;background:rgba(255,255,255,.08);color:rgba(255,255,255,.55)}
.data-toolbar .btn-data:hover{background:rgba(255,255,255,.15);color:#fff}
.data-toolbar .btn-data svg{width:14px;height:14px}

/* ===== RESPONSIVE (MOBILE) ===== */
@media(max-width:768px){
  .sidebar{width:100%;min-height:auto;height:auto;position:fixed;top:auto;bottom:0;left:0;right:0;flex-direction:row;padding:0;z-index:200;background:var(--fg-blue-dark);border-radius:0}
  .sidebar-top-bar,.sidebar-accent-bar,.logo,.sidebar-stats,.sidebar-footer,.data-toolbar{display:none}
  .nav-items{display:flex;flex-direction:row;justify-content:space-around;padding:6px 0;margin:0}
  .nav-items li{flex-direction:column;gap:3px;padding:8px 4px;font-size:.65rem;border-radius:0;margin:0;text-align:center;min-width:0}
  .nav-items li svg{width:22px;height:22px}
  main{position:fixed;left:0;top:0;right:0;bottom:64px;padding:0}
  .page-header{padding:16px 16px 0}
  .page-header h1{font-size:1.2rem}
  .page-content{padding:14px 16px 20px}
  .stats-row{grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:18px}
  .stat-card{padding:14px 16px}
  .stat-card .stat-number{font-size:1.3rem}
  .grid-2{grid-template-columns:1fr;gap:14px}
  .contacts-grid{grid-template-columns:1fr}
  .contacts-toolbar{flex-direction:column;gap:8px}
  .search-box{min-width:0;width:100%}
  .filter-pills{justify-content:center}
  .detail-panel{width:100vw}
  .modal{max-width:95vw}
  .focus-active{max-width:100%}
  .focus-card{padding:18px}
  .cat-grid{gap:4px}
  .cat-pill{padding:5px 10px;font-size:.75rem}
  .timer-options{gap:8px}
  .timer-opt{width:66px;height:66px}
  .btn{padding:8px 16px;font-size:.82rem}
  .form-row{grid-template-columns:1fr}
  #network-canvas{height:400px}
}
@media(max-width:480px){
  .stats-row{grid-template-columns:1fr 1fr;gap:8px}
  .stat-card .stat-icon{width:30px;height:30px;font-size:.9rem;margin-bottom:8px}
  .focus-card .fc-name{font-size:1.1rem}
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<nav class="sidebar">
  <div class="sidebar-top-bar"></div>
  <div class="sidebar-accent-bar"></div>
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <div class="logo-text">
      <span class="logo-brand">FLOWGATE AI</span>
      <span class="logo-name">KontaktFlow</span>
    </div>
  </div>
  <ul class="nav-items">
    <li class="active" data-view="dashboard" onclick="switchView('dashboard')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      Dashboard
    </li>
    <li data-view="contacts" onclick="switchView('contacts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      Kontakte
    </li>
    <li data-view="focus" onclick="switchView('focus')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Fokus
    </li>
    <li data-view="network" onclick="switchView('network')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="5" r="3"/><circle cx="5" cy="19" r="3"/><circle cx="19" cy="19" r="3"/><line x1="12" y1="8" x2="5" y2="16"/><line x1="12" y1="8" x2="19" y2="16"/><line x1="5" y1="19" x2="19" y2="19"/></svg>
      Netzwerk
    </li>
  </ul>
  <div class="sidebar-stats" id="sidebar-stats"></div>
  <div class="data-toolbar">
    <button class="btn-data" onclick="exportData()" title="Daten als JSON exportieren">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Export
    </button>
    <button class="btn-data" onclick="document.getElementById('import-file').click()" title="Daten aus JSON importieren">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Import
    </button>
    <input type="file" id="import-file" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div class="sidebar-footer">FLOWGATE AI</div>
</nav>

<!-- MAIN -->
<main>
  <div class="page-top-accent"></div>

  <!-- DASHBOARD -->
  <div class="view active" id="view-dashboard">
    <div class="page-header">
      <h1>Dashboard</h1>
      <button class="btn btn-primary" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Neuer Kontakt
      </button>
    </div>
    <div class="page-content">
      <div class="stats-row" id="stats-row"></div>
      <div class="grid-2">
        <div class="card">
          <div class="section-header">
            <div class="section-num">1</div>
            <span class="section-title-text">Heute kontaktieren</span>
          </div>
          <div class="section-accent"></div>
          <div class="today-list" id="today-list"></div>
        </div>
        <div class="card">
          <div class="section-header">
            <div class="section-num">2</div>
            <span class="section-title-text">Letzte Aktivitäten</span>
          </div>
          <div class="section-accent"></div>
          <div id="activity-list"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- CONTACTS -->
  <div class="view" id="view-contacts">
    <div class="page-header">
      <h1>Kontakte</h1>
      <button class="btn btn-primary" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Neuer Kontakt
      </button>
    </div>
    <div class="page-content">
      <div class="contacts-toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Kontakt suchen..." oninput="renderContacts()">
        </div>
        <div class="filter-pills">
          <div class="filter-pill active" data-filter="all" onclick="setFilter('all')">Alle</div>
          <div class="filter-pill" data-filter="green" onclick="setFilter('green')">Heiß</div>
          <div class="filter-pill" data-filter="yellow" onclick="setFilter('yellow')">Warm</div>
          <div class="filter-pill" data-filter="red" onclick="setFilter('red')">Kalt</div>
        </div>
      </div>
      <div class="contacts-grid" id="contacts-grid"></div>
    </div>
  </div>

  <!-- FOCUS MODE -->
  <div class="view" id="view-focus">
    <div class="page-header">
      <h1>Fokusmodus</h1>
      <button class="btn btn-secondary btn-sm" onclick="stopFocus()" id="focus-stop-btn" style="display:none">Beenden</button>
    </div>
    <div class="page-content" id="focus-content"></div>
  </div>

  <!-- NETWORK -->
  <div class="view" id="view-network">
    <div class="page-header">
      <h1>Netzwerk</h1>
      <button class="btn btn-secondary btn-sm" onclick="resetNetwork()">Zurücksetzen</button>
    </div>
    <div class="page-content">
      <div class="network-legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--safe-green)"></div> Heiß</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--fg-orange)"></div> Warm</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--warn-red)"></div> Kalt</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--gray-300)"></div> Verbindung</div>
      </div>
      <canvas id="network-canvas" height="560"></canvas>
    </div>
  </div>

</main>

<!-- ADD/EDIT MODAL -->
<div class="modal-overlay" id="contact-modal">
  <div class="modal">
    <div class="modal-top-bar"></div>
    <div class="modal-header">
      <h2 id="modal-title">Neuer Kontakt</h2>
      <button class="modal-close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="contact-id">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="f-name" placeholder="Vor- und Nachname">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Telefon</label>
          <input type="tel" id="f-phone" placeholder="+49 ...">
        </div>
        <div class="form-group">
          <label>Letztes Treffen</label>
          <input type="date" id="f-lastSeen">
        </div>
      </div>
      <div class="form-group">
        <label>Adresse</label>
        <input type="text" id="f-address" placeholder="Straße, PLZ Ort">
      </div>
      <div class="form-group">
        <label>Kategorie</label>
        <select id="f-category">
          <option value="">— Wählen —</option>
          <option value="schule">Schule / Ausbildung / Studium</option>
          <option value="arbeit">Früherer Arbeitsplatz</option>
          <option value="partner">Partner / Kinder</option>
          <option value="verwandte">Verwandte</option>
          <option value="nachbar">Nachbarschaft</option>
          <option value="sport">Sport / Hobby</option>
          <option value="urlaub">Urlaub</option>
          <option value="wohnung">Haus / Wohnung</option>
          <option value="verein">Verein / Verband / Gemeinde</option>
          <option value="events">Gesellschaftliche Ereignisse</option>
          <option value="dienstleister">Dienstleister / Geschäfte</option>
          <option value="sonstige">Sonstige</option>
        </select>
      </div>
      <div class="form-group">
        <label>Woher kennt ihr euch?</label>
        <input type="text" id="f-context" placeholder="z.B. Fußballverein, Nachbar, über Lisa...">
      </div>
      <div class="form-group">
        <label>Priorität</label>
        <div class="priority-select">
          <div class="priority-option green" onclick="selectPriority('green')">Heiß</div>
          <div class="priority-option yellow" onclick="selectPriority('yellow')">Warm</div>
          <div class="priority-option red" onclick="selectPriority('red')">Kalt</div>
        </div>
      </div>
      <div class="form-group">
        <label>Anruf-Status</label>
        <select id="f-callStatus">
          <option value="offen">Noch offen</option>
          <option value="angerufen">Angerufen</option>
          <option value="termin">Termin gemacht</option>
          <option value="kein_interesse">Kein Interesse</option>
          <option value="nachfassen">Nachfassen</option>
        </select>
      </div>
      <div class="form-group">
        <label>Nächste Aktion</label>
        <input type="text" id="f-nextAction" placeholder="z.B. Anrufen wegen Termin">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Aktion bis</label>
          <input type="date" id="f-nextDate">
        </div>
        <div class="form-group"><label>&nbsp;</label></div>
      </div>
      <div class="form-group">
        <label>Notizen</label>
        <textarea id="f-notes" placeholder="Freitext..."></textarea>
      </div>
      <div class="form-group link-section">
        <label>Verknüpfte Kontakte</label>
        <div class="link-list" id="link-list"></div>
        <div class="link-add">
          <select id="link-select"><option value="">Kontakt wählen...</option></select>
          <button class="btn btn-secondary btn-sm" onclick="addLink()">Verknüpfen</button>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Abbrechen</button>
      <button class="btn btn-primary" onclick="saveContact()">Speichern</button>
    </div>
  </div>
</div>

<!-- DETAIL PANEL -->
<div class="detail-overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detail-panel"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

 {"id": "imp0317", "name": "World-News", "phone": "+4917712060", "address": "", "context": "", "lastSeen": "", "nextAction": "", "nextDate": "", "notes": "", "priority": "yellow", "links": [], "createdAt": "2025-05-21T00:00:00.000Z", "updatedAt": "2025-05-21T00:00:00.000Z"}, {"id": "imp0318", "name": "Yannick", "phone": "+4915773535042", "address": "", "context": "", "lastSeen": "", "nextAction": "", "nextDate": "", "notes": "", "priority": "yellow", "links": [], "createdAt": "2025-05-21T00:00:00.000Z", "updatedAt": "2025-05-21T00:00:00.000Z"}, {"id": "imp0319", "name": "Yannick Petto", "phone": "+491728294669", "address": "", "context": "", "lastSeen": "", "nextAction": "", "nextDate": "", "notes": "", "priority": "yellow", "links": [], "createdAt": "2025-05-21T00:00:00.000Z", "updatedAt": "2025-05-21T00:00:00.000Z"}, {"id": "imp0320", "name": "Yvonne", "phone": "+4915753418124", "address": "", "context": "", "lastSeen": "", "nextAction": "", "nextDate": "", "notes": "", "priority": "yellow", "links": [], "createdAt": "2025-05-21T00:00:00.000Z", "updatedAt": "2025-05-21T00:00:00.000Z"}, {"id": "imp0321", "name": "Zec Plus", "phone": "+4915792451673", "address": "", "context": "", "lastSeen": "", "nextAction": "", "nextDate": "", "notes": "", "priority": "yellow", "links": [], "createdAt": "2025-05-21T00:00:00.000Z", "updatedAt": "2025-05-21T00:00:00.000Z"}, {"id": "imp0322", "name": "Zeitansage", "phone": "+4917712020", "address": "", "context": "", "lastSeen": "", "nextAction": "", "nextDate": "", "notes": "", "priority": "yellow", "links": [], "createdAt": "2025-05-21T00:00:00.000Z", "updatedAt": "2025-05-21T00:00:00.000Z"}];</script>
<script>
let contacts = JSON.parse(localStorage.getItem('kf_contacts') || '[]');
if (contacts.length === 0 && typeof SEED_CONTACTS !== 'undefined') {
  contacts = SEED_CONTACTS;
  localStorage.setItem('kf_contacts', JSON.stringify(contacts));
}
let currentFilter = 'all';
let selectedPriority = 'green';
let editingLinks = [];
let networkNodes = [];
let networkAnim = null;
let contactsPage = 0;
const PAGE_SIZE = 30;

const COLORS = {
  green: '#86B817', yellow: '#FF6600', red: '#CC2936',
  greenBg: '#F2F8E6', yellowBg: '#FFF3E8', redBg: '#FDEDEF'
};

const CATEGORIES = {
  schule: 'Schule / Ausbildung',
  arbeit: 'Arbeitsplatz',
  partner: 'Partner / Kinder',
  verwandte: 'Verwandte',
  nachbar: 'Nachbarschaft',
  sport: 'Sport / Hobby',
  urlaub: 'Urlaub',
  wohnung: 'Haus / Wohnung',
  verein: 'Verein / Verband',
  events: 'Events',
  dienstleister: 'Dienstleister',
  sonstige: 'Sonstige'
};

const CALL_STATUS = {
  offen: { label: 'Noch offen', color: 'var(--gray-500)', bg: 'var(--gray-100)' },
  angerufen: { label: 'Angerufen', color: 'var(--fg-blue)', bg: 'var(--fg-blue-light)' },
  termin: { label: 'Termin gemacht', color: 'var(--safe-green)', bg: 'var(--safe-green-bg)' },
  kein_interesse: { label: 'Kein Interesse', color: 'var(--warn-red)', bg: 'var(--warn-red-bg)' },
  nachfassen: { label: 'Nachfassen', color: 'var(--fg-orange)', bg: 'var(--fg-orange-light)' }
};

function save() { localStorage.setItem('kf_contacts', JSON.stringify(contacts)); }

function goContacts(filter) {
  switchView('contacts');
  setFilter(filter);
}
function genId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function formatDate(d) {
  if (!d) return '';
  return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function daysAgo(d) {
  if (!d) return null;
  return Math.floor((Date.now() - new Date(d).getTime()) / 86400000);
}

function priorityLabel(p) { return p === 'green' ? 'Heiß' : p === 'yellow' ? 'Warm' : 'Kalt'; }
function priorityColor(p) { return COLORS[p]; }
function priorityBg(p) { return COLORS[p + 'Bg']; }

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s || '';
  return d.innerHTML;
}

// ===== VIEWS =====
function switchView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-items li').forEach(li => {
    li.classList.toggle('active', li.dataset.view === name);
  });
  if (name === 'dashboard') renderDashboard();
  if (name === 'contacts') renderContacts();
  if (name === 'focus') renderFocusStart();
  if (name === 'network') initNetwork();
}

// ===== DASHBOARD =====
function renderDashboard() {
  const green = contacts.filter(c => c.priority === 'green').length;
  const yellow = contacts.filter(c => c.priority === 'yellow').length;
  const red = contacts.filter(c => c.priority === 'red').length;

  document.getElementById('stats-row').innerHTML = `
    <div class="stat-card total" onclick="goContacts('all')"><div class="stat-icon">👥</div><div class="stat-number">${contacts.length}</div><div class="stat-label">Gesamt</div></div>
    <div class="stat-card green" onclick="goContacts('green')"><div class="stat-icon">🔥</div><div class="stat-number">${green}</div><div class="stat-label">Heiße Kontakte</div></div>
    <div class="stat-card yellow" onclick="goContacts('yellow')"><div class="stat-icon">🟠</div><div class="stat-number">${yellow}</div><div class="stat-label">Warme Kontakte</div></div>
    <div class="stat-card red" onclick="goContacts('red')"><div class="stat-icon">❄️</div><div class="stat-number">${red}</div><div class="stat-label">Kalte Kontakte</div></div>
  `;

  const upcoming = contacts.filter(c => c.nextAction).sort((a, b) => (a.nextDate || '9') < (b.nextDate || '9') ? -1 : 1).slice(0, 6);
  const todayEl = document.getElementById('today-list');
  if (upcoming.length === 0) {
    todayEl.innerHTML = '<div class="empty-state"><p>Keine anstehenden Aktionen</p></div>';
  } else {
    todayEl.innerHTML = upcoming.map(c => `
      <div class="today-item" onclick="openDetail('${c.id}')">
        <div class="priority-dot" style="background:${priorityColor(c.priority)}"></div>
        <div class="ti-info">
          <div class="ti-name">${esc(c.name)}</div>
          <div class="ti-context">${esc(c.nextAction)}</div>
        </div>
        <div class="ti-action">${c.nextDate ? formatDate(c.nextDate) : 'Offen'}</div>
      </div>
    `).join('');
  }

  const sorted = [...contacts].sort((a, b) => (b.updatedAt || b.createdAt) > (a.updatedAt || a.createdAt) ? 1 : -1).slice(0, 5);
  const actEl = document.getElementById('activity-list');
  if (sorted.length === 0) {
    actEl.innerHTML = '<div class="empty-state"><p>Noch keine Kontakte angelegt</p></div>';
  } else {
    actEl.innerHTML = sorted.map(c => {
      const days = daysAgo(c.updatedAt || c.createdAt);
      const timeStr = days === 0 ? 'Heute' : days === 1 ? 'Gestern' : `Vor ${days} Tagen`;
      return `<div class="activity-item"><div class="activity-dot" style="background:${priorityColor(c.priority)}"></div><div><div class="activity-text"><strong>${esc(c.name)}</strong> — ${c.updatedAt && c.updatedAt !== c.createdAt ? 'aktualisiert' : 'hinzugefügt'}</div><div class="activity-time">${timeStr}</div></div></div>`;
    }).join('');
  }
  renderSidebarStats();
}

function renderSidebarStats() {
  const el = document.getElementById('sidebar-stats');
  const withAction = contacts.filter(c => c.nextAction).length;
  const linked = contacts.filter(c => c.links && c.links.length > 0).length;
  el.innerHTML = `
    <div class="stat-row"><span>Kontakte</span><span>${contacts.length}</span></div>
    <div class="stat-row"><span>Offene Aktionen</span><span>${withAction}</span></div>
    <div class="stat-row"><span>Verknüpft</span><span>${linked}</span></div>
  `;
}

// ===== CONTACTS =====
function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-pill').forEach(p => {
    p.classList.remove('active', 'active-green', 'active-yellow', 'active-red');
    if (p.dataset.filter === f) {
      if (f === 'green') p.classList.add('active-green');
      else if (f === 'yellow') p.classList.add('active-yellow');
      else if (f === 'red') p.classList.add('active-red');
      else p.classList.add('active');
    }
  });
  renderContacts();
}

function renderContacts(resetPage) {
  if (resetPage !== false) contactsPage = 0;
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  let list = contacts;
  if (currentFilter !== 'all') list = list.filter(c => c.priority === currentFilter);
  if (q) list = list.filter(c => c.name.toLowerCase().includes(q) || (c.context || '').toLowerCase().includes(q) || (c.address || '').toLowerCase().includes(q) || (c.phone || '').includes(q));

  const grid = document.getElementById('contacts-grid');
  if (list.length === 0) {
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>
      <h3>${contacts.length === 0 ? 'Noch keine Kontakte' : 'Keine Treffer'}</h3>
      <p>${contacts.length === 0 ? 'Lege deinen ersten Kontakt an!' : 'Versuch einen anderen Suchbegriff.'}</p>
      ${contacts.length === 0 ? '<button class="btn btn-primary" onclick="openAddModal()">Neuer Kontakt</button>' : ''}
    </div>`;
    return;
  }

  const shown = list.slice(0, (contactsPage + 1) * PAGE_SIZE);
  const hasMore = shown.length < list.length;

  grid.innerHTML = shown.map(c => {
    const linkedNames = (c.links || []).map(id => {
      const lc = contacts.find(x => x.id === id);
      return lc ? `<span class="cc-link-badge">${esc(lc.name)}</span>` : '';
    }).join('');
    return `
    <div class="contact-card p-${c.priority}" onclick="openDetail('${c.id}')">
      <div class="cc-header">
        <div class="cc-name">${esc(c.name)}</div>
        <span class="cc-priority ${c.priority}">${priorityLabel(c.priority)}</span>
      </div>
      <div class="cc-details">
        ${c.phone ? `<div class="cc-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>${esc(c.phone)}</div>` : ''}
        ${c.category ? `<div class="cc-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 20h16a2 2 0 002-2V8a2 2 0 00-2-2h-7.93a2 2 0 01-1.66-.9l-.82-1.2A2 2 0 007.93 3H4a2 2 0 00-2 2v13a2 2 0 002 2z"/></svg>${esc(CATEGORIES[c.category]||c.category)}</div>` : ''}
        ${c.context ? `<div class="cc-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>${esc(c.context)}</div>` : ''}
        ${c.nextAction ? `<div class="cc-detail"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>${esc(c.nextAction)}</div>` : ''}
      </div>
      ${linkedNames ? `<div class="cc-links">${linkedNames}</div>` : ''}
      <div class="cc-footer">
        <span class="cc-last-seen">Gesehen: ${c.lastSeen ? formatDate(c.lastSeen) : '—'}</span>
        ${c.callStatus && c.callStatus !== 'offen' ? `<span class="cc-call-status" style="background:${CALL_STATUS[c.callStatus].bg};color:${CALL_STATUS[c.callStatus].color}">${CALL_STATUS[c.callStatus].label}</span>` : ''}
      </div>
    </div>`;
  }).join('') + (hasMore ? `
    <div style="grid-column:1/-1;text-align:center;padding:16px">
      <span style="font-size:.84rem;color:var(--gray-500);margin-right:12px">${shown.length} von ${list.length} Kontakten</span>
      <button class="btn btn-secondary btn-sm" onclick="contactsPage++;renderContacts(false)">Mehr laden</button>
    </div>` : `
    <div style="grid-column:1/-1;text-align:center;padding:8px">
      <span style="font-size:.82rem;color:var(--gray-500)">${list.length} Kontakte</span>
    </div>`);
}

// ===== MODAL =====
function openAddModal(id) {
  document.getElementById('contact-modal').classList.add('open');
  document.getElementById('modal-title').textContent = id ? 'Kontakt bearbeiten' : 'Neuer Kontakt';

  if (id) {
    const c = contacts.find(x => x.id === id);
    document.getElementById('contact-id').value = c.id;
    document.getElementById('f-name').value = c.name;
    document.getElementById('f-phone').value = c.phone || '';
    document.getElementById('f-address').value = c.address || '';
    document.getElementById('f-category').value = c.category || '';
    document.getElementById('f-context').value = c.context || '';
    document.getElementById('f-lastSeen').value = c.lastSeen || '';
    document.getElementById('f-callStatus').value = c.callStatus || 'offen';
    document.getElementById('f-nextAction').value = c.nextAction || '';
    document.getElementById('f-nextDate').value = c.nextDate || '';
    document.getElementById('f-notes').value = c.notes || '';
    selectedPriority = c.priority;
    editingLinks = [...(c.links || [])];
  } else {
    document.getElementById('contact-id').value = '';
    document.getElementById('f-name').value = '';
    document.getElementById('f-phone').value = '';
    document.getElementById('f-address').value = '';
    document.getElementById('f-category').value = '';
    document.getElementById('f-context').value = '';
    document.getElementById('f-lastSeen').value = new Date().toISOString().slice(0, 10);
    document.getElementById('f-callStatus').value = 'offen';
    document.getElementById('f-nextAction').value = '';
    document.getElementById('f-nextDate').value = '';
    document.getElementById('f-notes').value = '';
    selectedPriority = 'green';
    editingLinks = [];
  }
  updatePriorityUI();
  renderLinkList();
  populateLinkSelect(id);
  document.getElementById('f-name').focus();
}

function closeModal() { document.getElementById('contact-modal').classList.remove('open'); }

function selectPriority(p) { selectedPriority = p; updatePriorityUI(); }

function updatePriorityUI() {
  document.querySelectorAll('.priority-option').forEach(el => {
    el.classList.toggle('selected', el.classList.contains(selectedPriority));
  });
}

function populateLinkSelect(excludeId) {
  const sel = document.getElementById('link-select');
  sel.innerHTML = '<option value="">Kontakt wählen...</option>';
  contacts.filter(c => c.id !== excludeId && !editingLinks.includes(c.id))
    .sort((a, b) => a.name.localeCompare(b.name))
    .forEach(c => { sel.innerHTML += `<option value="${c.id}">${esc(c.name)}</option>`; });
}

function renderLinkList() {
  document.getElementById('link-list').innerHTML = editingLinks.map(id => {
    const c = contacts.find(x => x.id === id);
    return c ? `<div class="link-tag">${esc(c.name)}<span class="remove-link" onclick="removeLink('${id}')">&times;</span></div>` : '';
  }).join('');
}

function addLink() {
  const sel = document.getElementById('link-select');
  if (!sel.value) return;
  editingLinks.push(sel.value);
  renderLinkList();
  populateLinkSelect(document.getElementById('contact-id').value);
}

function removeLink(id) {
  editingLinks = editingLinks.filter(x => x !== id);
  renderLinkList();
  populateLinkSelect(document.getElementById('contact-id').value);
}

function saveContact() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { toast('Bitte Namen eingeben'); return; }

  const id = document.getElementById('contact-id').value;
  const now = new Date().toISOString();
  const data = {
    name,
    phone: document.getElementById('f-phone').value.trim(),
    address: document.getElementById('f-address').value.trim(),
    category: document.getElementById('f-category').value,
    context: document.getElementById('f-context').value.trim(),
    lastSeen: document.getElementById('f-lastSeen').value,
    callStatus: document.getElementById('f-callStatus').value,
    nextAction: document.getElementById('f-nextAction').value.trim(),
    nextDate: document.getElementById('f-nextDate').value,
    notes: document.getElementById('f-notes').value.trim(),
    priority: selectedPriority,
    links: [...editingLinks],
    updatedAt: now
  };

  if (id) {
    const idx = contacts.findIndex(c => c.id === id);
    contacts[idx] = { ...contacts[idx], ...data };
    toast('Kontakt aktualisiert');
  } else {
    contacts.push({ id: genId(), ...data, createdAt: now });
    toast('Kontakt hinzugefügt');
  }

  editingLinks.forEach(linkId => {
    const lc = contacts.find(c => c.id === linkId);
    if (lc) {
      const targetId = id || contacts[contacts.length - 1].id;
      if (!lc.links) lc.links = [];
      if (!lc.links.includes(targetId)) lc.links.push(targetId);
    }
  });

  save();
  closeModal();
  renderDashboard();
  renderContacts();
}

function deleteContact(id) {
  if (!confirm('Kontakt wirklich löschen?')) return;
  contacts = contacts.filter(c => c.id !== id);
  contacts.forEach(c => { if (c.links) c.links = c.links.filter(l => l !== id); });
  save();
  closeDetail();
  renderDashboard();
  renderContacts();
  toast('Kontakt gelöscht');
}

function quickCallStatus(id, status) {
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  c.callStatus = status;
  c.updatedAt = new Date().toISOString();
  if (!c.callLog) c.callLog = [];
  c.callLog.push({ status, date: new Date().toISOString().slice(0,10) });
  save();
  openDetail(id);
  renderContacts(false);
  toast(`${c.name} → ${CALL_STATUS[status].label}`);
}

function quickPriority(id, p) {
  const c = contacts.find(x => x.id === id);
  if (!c || c.priority === p) return;
  c.priority = p;
  c.updatedAt = new Date().toISOString();
  save();
  openDetail(id);
  renderDashboard();
  renderContacts(false);
  toast(`${c.name} → ${priorityLabel(p)}`);
}

function searchLink(contactId, query) {
  const res = document.getElementById('ql-results');
  const c = contacts.find(x => x.id === contactId);
  const existingLinks = c.links || [];
  const q = query.toLowerCase().trim();

  if (q.length < 1) { res.classList.remove('open'); return; }

  const matches = contacts
    .filter(x => x.id !== contactId && !existingLinks.includes(x.id))
    .filter(x => x.name.toLowerCase().includes(q) || (x.phone || '').includes(q))
    .slice(0, 8);

  if (matches.length === 0) {
    res.innerHTML = '<div style="padding:12px 14px;font-size:.84rem;color:var(--gray-500)">Keine Treffer</div>';
  } else {
    res.innerHTML = matches.map(m => `
      <div class="qlr-item" onmousedown="quickLink('${contactId}','${m.id}')">
        <div class="qlr-dot" style="background:${priorityColor(m.priority)}"></div>
        <span class="qlr-name">${esc(m.name)}</span>
        <span class="qlr-phone">${esc(m.phone || '')}</span>
      </div>`).join('');
  }
  res.classList.add('open');
}

function quickLink(fromId, toId) {
  const from = contacts.find(x => x.id === fromId);
  const to = contacts.find(x => x.id === toId);
  if (!from || !to) return;

  if (!from.links) from.links = [];
  if (!to.links) to.links = [];
  if (!from.links.includes(toId)) from.links.push(toId);
  if (!to.links.includes(fromId)) to.links.push(fromId);

  from.updatedAt = new Date().toISOString();
  to.updatedAt = new Date().toISOString();
  save();
  openDetail(fromId);
  renderContacts(false);
  toast(`${from.name} ↔ ${to.name} verknüpft`);
}

function closeQLResults(e) {
  const res = document.getElementById('ql-results');
  if (res && !e.target.closest('.quick-link-box')) res.classList.remove('open');
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
  document.removeEventListener('click', closeQLResults);
}

// ===== NETWORK =====
function initNetwork() {
  const canvas = document.getElementById('network-canvas');
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.parentElement.clientWidth;
  canvas.height = 560;

  const linkedContacts = contacts.filter(c => c.links && c.links.length > 0);
  const linkedIds = new Set(linkedContacts.map(c => c.id));
  linkedContacts.forEach(c => (c.links || []).forEach(lid => linkedIds.add(lid)));
  const netContacts = contacts.filter(c => linkedIds.has(c.id));

  if (netContacts.length === 0) {
    ctx.fillStyle = '#9E9E9E';
    ctx.font = '15px -apple-system,system-ui,sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('Noch keine Verknüpfungen vorhanden', canvas.width / 2, canvas.height / 2 - 10);
    ctx.font = '12px -apple-system,system-ui,sans-serif';
    ctx.fillText('Verknüpfe Kontakte im Detail-Panel, um dein Netzwerk zu sehen', canvas.width / 2, canvas.height / 2 + 14);
    return;
  }

  const cx = canvas.width / 2, cy = canvas.height / 2;
  networkNodes = netContacts.map((c, i) => {
    const angle = (2 * Math.PI * i) / netContacts.length;
    const r = Math.min(cx, cy) * 0.6;
    return {
      id: c.id,
      x: cx + r * Math.cos(angle) + (Math.random() - .5) * 40,
      y: cy + r * Math.sin(angle) + (Math.random() - .5) * 40,
      vx: 0, vy: 0,
      name: c.name, priority: c.priority, links: c.links || []
    };
  });

  let dragging = null, mouseX = 0, mouseY = 0;
  canvas.onmousedown = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    for (const n of networkNodes) if (Math.hypot(n.x - x, n.y - y) < 28) { dragging = n; break; }
  };
  canvas.onmousemove = (e) => {
    const rect = canvas.getBoundingClientRect();
    mouseX = e.clientX - rect.left; mouseY = e.clientY - rect.top;
    if (dragging) { dragging.x = mouseX; dragging.y = mouseY; dragging.vx = 0; dragging.vy = 0; }
  };
  canvas.onmouseup = () => { dragging = null; };
  canvas.ondblclick = (e) => {
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left, y = e.clientY - rect.top;
    for (const n of networkNodes) if (Math.hypot(n.x - x, n.y - y) < 28) { openDetail(n.id); break; }
  };

  if (networkAnim) cancelAnimationFrame(networkAnim);

  function simulate() {
    for (const n of networkNodes) {
      for (const m of networkNodes) {
        if (n === m) continue;
        const dx = n.x - m.x, dy = n.y - m.y;
        const dist = Math.max(Math.hypot(dx, dy), 1);
        const f = 3000 / (dist * dist);
        n.vx += (dx / dist) * f; n.vy += (dy / dist) * f;
      }
      for (const lid of n.links) {
        const m = networkNodes.find(x => x.id === lid);
        if (!m) continue;
        n.vx += (m.x - n.x) * .005; n.vy += (m.y - n.y) * .005;
      }
      n.vx += (cx - n.x) * .001; n.vy += (cy - n.y) * .001;
    }

    for (const n of networkNodes) {
      if (n === dragging) continue;
      n.vx *= .85; n.vy *= .85;
      n.x += n.vx; n.y += n.vy;
      n.x = Math.max(40, Math.min(canvas.width - 40, n.x));
      n.y = Math.max(40, Math.min(canvas.height - 40, n.y));
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    for (const n of networkNodes) {
      for (const lid of n.links) {
        const m = networkNodes.find(x => x.id === lid);
        if (!m) continue;
        ctx.beginPath(); ctx.moveTo(n.x, n.y); ctx.lineTo(m.x, m.y);
        ctx.strokeStyle = 'rgba(224,224,224,.6)'; ctx.lineWidth = 2; ctx.stroke();
      }
    }

    let hovered = null;
    for (const n of networkNodes) if (Math.hypot(n.x - mouseX, n.y - mouseY) < 28) hovered = n;

    for (const n of networkNodes) {
      const col = priorityColor(n.priority);
      const isHov = n === hovered;
      const r = isHov ? 26 : 22;

      ctx.beginPath(); ctx.arc(n.x, n.y, r + 4, 0, Math.PI * 2);
      ctx.fillStyle = col + '20'; ctx.fill();

      ctx.beginPath(); ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
      ctx.fillStyle = col; ctx.fill();

      ctx.fillStyle = '#fff';
      ctx.font = `${isHov ? '600 13' : '600 11'}px -apple-system,system-ui,sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(n.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase(), n.x, n.y);

      ctx.fillStyle = isHov ? '#212121' : '#616161';
      ctx.font = `${isHov ? '600 13' : '12'}px -apple-system,system-ui,sans-serif`;
      ctx.textBaseline = 'top';
      ctx.fillText(n.name, n.x, n.y + r + 8);
    }
    networkAnim = requestAnimationFrame(simulate);
  }
  simulate();
}

function resetNetwork() { initNetwork(); }
window.addEventListener('resize', () => {
  if (document.querySelector('.nav-items li.active')?.dataset.view === 'network') initNetwork();
});

// ===== FOCUS MODE =====
let focusTimer = null;
let focusSeconds = 0;
let focusContacts = [];
let focusIndex = 0;
let focusPriority = 'yellow';
let focusCategory = '';
let focusLinksTemp = [];
let focusEdited = 0;

function renderFocusStart() {
  document.getElementById('focus-stop-btn').style.display = 'none';
  const uncategorized = contacts.filter(c => !c.category).length;
  document.getElementById('focus-content').innerHTML = `
    <div class="focus-start">
      <div class="section-header" style="justify-content:center;margin-bottom:4px">
        <div class="section-num">F</div>
        <span class="section-title-text">Dein tägliches 10-Minuten-Training</span>
      </div>

      <div class="timer-options">
        <div class="timer-opt selected" onclick="selectTimer(10,this)"><div class="to-min">10</div><div class="to-label">Minuten</div></div>
        <div class="timer-opt" onclick="selectTimer(15,this)"><div class="to-min">15</div><div class="to-label">Minuten</div></div>
        <div class="timer-opt" onclick="selectTimer(20,this)"><div class="to-min">20</div><div class="to-label">Minuten</div></div>
      </div>
      <button class="btn btn-orange" onclick="startFocus()" style="padding:14px 40px;font-size:1rem">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        Fokus starten
      </button>
    </div>`;
  focusSeconds = 600;
}

let selectedTimerMin = 10;
function selectTimer(min, el) {
  selectedTimerMin = min;
  focusSeconds = min * 60;
  document.querySelectorAll('.timer-opt').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');
}

function startFocus() {
  const uncat = contacts.filter(c => !c.category);
  const pool = uncat.length > 0 ? uncat : contacts;
  focusContacts = [...pool].sort(() => Math.random() - .5).slice(0, 10);
  focusIndex = 0;
  focusEdited = 0;
  focusSeconds = selectedTimerMin * 60;
  document.getElementById('focus-stop-btn').style.display = '';

  if (focusTimer) clearInterval(focusTimer);
  focusTimer = setInterval(() => {
    focusSeconds--;
    updateTimerDisplay();
    if (focusSeconds <= 0) stopFocus();
  }, 1000);

  renderFocusCard();
}

function updateTimerDisplay() {
  const el = document.getElementById('ftb-time');
  if (!el) return;
  const m = Math.floor(focusSeconds / 60);
  const s = focusSeconds % 60;
  el.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

function renderFocusCard() {
  if (focusIndex >= focusContacts.length) { showFocusSummary(); return; }
  const c = focusContacts[focusIndex];
  focusPriority = c.priority || 'yellow';
  focusCategory = c.category || '';
  focusLinksTemp = [];

  const catPills = Object.entries(CATEGORIES).map(([k,v]) =>
    `<div class="cat-pill ${focusCategory===k?'selected':''}" onclick="focusSetCat('${k}',this)">${v}</div>`
  ).join('');

  document.getElementById('focus-content').innerHTML = `
    <div class="focus-active">
      <div class="focus-timer-bar">
        <span class="ftb-progress">Kontakt ${focusIndex+1} / ${focusContacts.length}</span>
        <span class="ftb-time" id="ftb-time">${Math.floor(focusSeconds/60)}:${(focusSeconds%60).toString().padStart(2,'0')}</span>
      </div>
      <div class="focus-progress"><div class="focus-progress-fill" style="width:${((focusIndex)/focusContacts.length)*100}%"></div></div>
      <div class="focus-card">
        <div class="fc-name">${esc(c.name)}</div>
        <div class="fc-phone">${c.phone ? esc(c.phone) : 'Keine Nummer'}</div>
        <div class="fc-section">
          <div class="fc-label">Kategorie — Woher kennst du die Person?</div>
          <div class="cat-grid">${catPills}</div>
        </div>
        <div class="fc-section">
          <div class="fc-label">Priorität</div>
          <div class="fc-priority">
            <div class="fp-btn ${focusPriority==='green'?'sel-green':''}" onclick="focusSetPri('green')">Heiß</div>
            <div class="fp-btn ${focusPriority==='yellow'?'sel-yellow':''}" onclick="focusSetPri('yellow')">Warm</div>
            <div class="fp-btn ${focusPriority==='red'?'sel-red':''}" onclick="focusSetPri('red')">Kalt</div>
          </div>
        </div>
        <div class="fc-section">
          <div class="fc-label">Verknüpfen</div>
          <div class="focus-link-area">
            <div id="focus-links"></div>
            <div class="quick-link-box">
              <input class="quick-link-input" type="text" placeholder="Namen eingeben..." oninput="focusSearchLink('${c.id}',this.value)" id="focus-ql-input">
              <div class="quick-link-results" id="focus-ql-results"></div>
            </div>
          </div>
        </div>
        <div class="focus-actions">
          <button class="btn btn-secondary" onclick="focusSkip()">Überspringen</button>
          <button class="btn btn-primary" onclick="focusSave()">Speichern & Weiter</button>
        </div>
      </div>
    </div>`;
}

function focusSetCat(cat, el) {
  focusCategory = cat;
  document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('selected'));
  el.classList.add('selected');
}

function focusSetPri(p) {
  focusPriority = p;
  document.querySelectorAll('.fp-btn').forEach(b => b.classList.remove('sel-green','sel-yellow','sel-red'));
  event.target.classList.add('sel-' + p);
}

function focusSearchLink(contactId, query) {
  const res = document.getElementById('focus-ql-results');
  const q = query.toLowerCase().trim();
  if (q.length < 1) { res.classList.remove('open'); return; }
  const matches = contacts
    .filter(x => x.id !== contactId && !focusLinksTemp.includes(x.id))
    .filter(x => x.name.toLowerCase().includes(q))
    .slice(0, 6);
  res.innerHTML = matches.length === 0
    ? '<div style="padding:10px 14px;font-size:.84rem;color:var(--gray-500)">Keine Treffer</div>'
    : matches.map(m => `<div class="qlr-item" onmousedown="focusAddLink('${contactId}','${m.id}')"><div class="qlr-dot" style="background:${priorityColor(m.priority)}"></div><span class="qlr-name">${esc(m.name)}</span></div>`).join('');
  res.classList.add('open');
}

function focusAddLink(fromId, toId) {
  focusLinksTemp.push(toId);
  const to = contacts.find(x => x.id === toId);
  const el = document.getElementById('focus-links');
  el.innerHTML += `<div class="link-tag">${esc(to.name)}<span class="remove-link" onclick="this.parentElement.remove();focusLinksTemp=focusLinksTemp.filter(x=>x!=='${toId}')">&times;</span></div>`;
  document.getElementById('focus-ql-input').value = '';
  document.getElementById('focus-ql-results').classList.remove('open');
}

function focusSave() {
  const c = focusContacts[focusIndex];
  c.category = focusCategory;
  c.priority = focusPriority;
  c.updatedAt = new Date().toISOString();
  if (!c.links) c.links = [];
  focusLinksTemp.forEach(lid => {
    if (!c.links.includes(lid)) c.links.push(lid);
    const lc = contacts.find(x => x.id === lid);
    if (lc) { if (!lc.links) lc.links = []; if (!lc.links.includes(c.id)) lc.links.push(c.id); }
  });
  save();
  focusEdited++;
  focusIndex++;
  renderFocusCard();
}

function focusSkip() {
  focusIndex++;
  renderFocusCard();
}

function stopFocus() {
  if (focusTimer) { clearInterval(focusTimer); focusTimer = null; }
  showFocusSummary();
}

function showFocusSummary() {
  if (focusTimer) { clearInterval(focusTimer); focusTimer = null; }
  document.getElementById('focus-stop-btn').style.display = 'none';
  const green = contacts.filter(c => c.priority === 'green').length;
  const categorized = contacts.filter(c => c.category).length;
  const linked = contacts.filter(c => c.links && c.links.length > 0).length;

  document.getElementById('focus-content').innerHTML = `
    <div class="focus-summary">
      <div class="section-header" style="justify-content:center;margin-bottom:4px">
        <div class="section-num" style="background:var(--safe-green)">&#10003;</div>
        <span class="section-title-text">Session abgeschlossen!</span>
      </div>
      <div class="section-accent" style="margin:6px auto 20px"></div>
      <p style="color:var(--gray-500)">Du hast ${focusEdited} Kontakte bearbeitet.</p>
      <div class="fs-stats">
        <div class="fs-stat"><div class="fs-num">${categorized}</div><div class="fs-label">Kategorisiert</div></div>
        <div class="fs-stat"><div class="fs-num">${green}</div><div class="fs-label">Heiße Leads</div></div>
        <div class="fs-stat"><div class="fs-num">${linked}</div><div class="fs-label">Verknüpft</div></div>
      </div>
      <button class="btn btn-orange" onclick="renderFocusStart()" style="margin-top:16px">Neue Session starten</button>
      <button class="btn btn-secondary" onclick="switchView('dashboard')" style="margin-top:8px">Zum Dashboard</button>
    </div>`;
  renderDashboard();
}

// ===== EXPORT / IMPORT =====
function exportData() {
  const data = {
    version: 1,
    exportDate: new Date().toISOString(),
    app: 'KontaktFlow',
    contacts: contacts
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `kontaktflow-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
  toast('Backup heruntergeladen');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const data = JSON.parse(e.target.result);
      let imported;
      if (data.contacts && Array.isArray(data.contacts)) {
        imported = data.contacts;
      } else if (Array.isArray(data)) {
        imported = data;
      } else {
        toast('Ungueltiges Format'); return;
      }
      const valid = imported.filter(c => c.name && c.id);
      if (valid.length === 0) { toast('Keine gueltigen Kontakte gefunden'); return; }
      const merge = confirm(`${valid.length} Kontakte gefunden.\n\nOK = Zusammenfuehren (bestehende behalten)\nAbbrechen = Alles ersetzen`);
      if (merge) {
        const existingIds = new Set(contacts.map(c => c.id));
        let added = 0;
        valid.forEach(c => {
          if (!existingIds.has(c.id)) {
            contacts.push(c);
            added++;
          } else {
            const idx = contacts.findIndex(x => x.id === c.id);
            if (idx >= 0 && c.updatedAt > (contacts[idx].updatedAt || '')) {
              contacts[idx] = c;
              added++;
            }
          }
        });
        toast(`${added} Kontakte aktualisiert/hinzugefuegt`);
      } else {
        contacts = valid;
        toast(`${valid.length} Kontakte importiert`);
      }
      save();
      renderDashboard();
      renderContacts();
    } catch (err) {
      toast('Fehler beim Import: ' + err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

renderDashboard();
</script>
